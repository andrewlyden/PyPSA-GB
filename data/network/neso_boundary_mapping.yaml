# ══════════════════════════════════════════════════════════════════════════════
# NESO Constraint Boundary → PyPSA Line Mapping
# ══════════════════════════════════════════════════════════════════════════════
#
# Maps NESO Day-Ahead Constraint Groups to sets of PyPSA ETYS lines.
# Used by the "neso" outage_schedule source in solve_network.py.
#
# For each boundary:
#   lines:       List of PyPSA line IDs forming the boundary cut
#   total_s_nom: Sum of s_nom for those lines (auto-computed if omitted)
#   description: Human-readable description
#
# The NESO "Limit (MW)" at each timestep is the maximum aggregate transfer
# across the boundary. We convert this to per-line s_max_pu:
#   s_max_pu = NESO_limit / total_s_nom
#
# Data source: https://www.neso.energy/data-portal/day-ahead-constraint-flows-and-limits
# API resource ID: 38a18ec1-9e40-465d-93fb-301e80fd1352
#
# Network diagrams:
#   England & Wales: FLOWSTH, GM+SNOW5A, HARSPNBLY, SEIMPPR23, SSHARN3
#   Scotland: ERROEX, GALLEX, NKILGRMO, SCOTEX, SSE+SP2, SSEN-S
# ══════════════════════════════════════════════════════════════════════════════

boundaries:

  # ── B6: Scotland-England boundary ──────────────────────────────────────────
  # 4 × 400kV AC circuits: Eccles-Stella West (×2), Elvanfoot-Gretna, Harker-Moffat
  # + Western HVDC Link (FLIB41_HUCS4-_0, 2250 MW Scotland↔England)
  # NESO SCOTEX flow data measures total transfer including HVDC.
  # Positive convention: Scotland → England (export).
  # Western HVDC: bus0=FLIB41 (England), bus1=HUCS4- (Scotland), so negative p0 = export.
  SCOTEX:
    description: "Scotland-England (B6). 4 × 400kV AC circuits + Western HVDC."
    lines:
      - ECCL4C_STWB4Q_0   # 2770 MVA — Eccles to Stella West (circuit 1)
      - ECCL4D_STWB4R_0   # 2770 MVA — Eccles to Stella West (circuit 2)
      - ELVA4-_GRNA4C_0   # 2210 MVA — Elvanfoot to Gretna
      - HAKB4-_MOFF4C_0   # 2210 MVA — Harker to Moffat
    links:
      # bus0=FLIB41 (England), bus1=HUCS4- (Scotland): negative p0 = Scotland→England export
      - name: FLIB41_HUCS4-_0
        sign: -1   # flip sign so positive = Scotland→England
    flow_groups:
      # Figure-backed B6 cut: all four circuits already align with the same
      # Scotland-to-England transfer direction in ETYS.
      positive:
        - ECCL4C_STWB4Q_0
        - ECCL4D_STWB4R_0
        - ELVA4-_GRNA4C_0
        - HAKB4-_MOFF4C_0

  # ── SSE-SP: SSE Transmission / SP Transmission boundary ────────────────────
  # Major 400kV + 275kV circuits crossing the Highland-Central Belt boundary.
  # The Scotland boundary diagram shows Tummel, Braco West, Tealing,
  # Glenrothes, and Westfield sitting on the SSE-SP seam, but the ETYS
  # topology splits those corridors into separate north and south branches.
  # Include the south ETYS legs as well as the original figure-backed
  # crossings so the ETYS cut does not leave diagram-backed bypasses around
  # those split substations.
  SSE-SP:
    description: "SSE-SP Transmission (B2). Major Highland-Central Belt circuits."
    lines:
      - BONB4-_TUMM4-_0   # 2780 MVA — Bonnybridge to Tummel (400kV)
      - FAUG2K_TUMM2J_0   # 1910 MVA — southern Tummel ETYS split leg
      - BONB2J_BRCW2K_0   # 1910 MVA — Bonnybridge to Braco West (275kV, ETYS south Braco split)
      - BRCW2J_KINA2K_0   # 1910 MVA — Braco West to Kinalmond (275kV)
      - ALYT2A_KINB2J_0   # 1090 MVA — Alyth to Kinbrace (275kV)
      - ALYT2B_KINB2K_0   # 1090 MVA — parallel circuit
      - KINT2K_TEAL2B_0   # 695 MVA — southern Tealing ETYS split leg
      - TEAL2J_WFIB2-_0   # 1090 MVA — Tealing to Westfield (275kV)
      - WFIB2-_WFIE2-_0   # 1090 MVA — Westfield north→south ETYS split leg
      - GLRB2-_TEAL2K_0   # 1090 MVA — Glenrothes to Tealing (275kV)
      - GLRB2-_GLRO2-_0   # 1090 MVA — Glenrothes north→south ETYS split leg
    flow_groups:
      # Figure-backed B2 cut. The geographic boundary is correct, but ETYS bus
      # ordering is mixed across the cut and some substations are split into
      # separate north/south ETYS buses. Positive means "north to south across
      # the SSE-SP boundary" for validation purposes.
      positive:
        - FAUG2K_TUMM2J_0
        - ALYT2A_KINB2J_0
        - ALYT2B_KINB2K_0
        - KINT2K_TEAL2B_0
        - TEAL2J_WFIB2-_0
        - WFIB2-_WFIE2-_0
        - GLRB2-_GLRO2-_0
      negative:
        - BONB4-_TUMM4-_0
        - BONB2J_BRCW2K_0
        - BRCW2J_KINA2K_0
        - GLRB2-_TEAL2K_0

  # ── SSHARN: South of SHARN (Norfolk/Suffolk export boundary) ───────────────
  # Two separate line sets serve different purposes:
  #
  #   constraint_lines  — used by solve_network.py for per-line s_max_pu derating.
  #     The 5 direct export-corridor lines (Bramford→Frieston ×3 + Burwell→Walpole ×2)
  #     form the physical chokepoint.  Total s_nom = 14,989 MVA, giving
  #     s_max_pu ≈ 0.43 for a 6,500 MW NESO limit (vs 0.18 with all 13 lines).
  #
  #   lines / flow_groups — used by validate_neso_constraints.py for flow reconstruction.
  #     The full 13-line figure-backed union with signed groups correctly captures
  #     the aggregate boundary transfer for comparison against NESO DA flows.
  #
  # TODO: Replace the per-line s_max_pu approach with a proper aggregate boundary
  #       constraint: sum(flow[line] for line in constraint_lines) <= NESO_limit[t].
  #       Until then, constraint_lines is an approximation.
  SSHARN:
    description: "South of SHARN (figure-backed East Anglia export loop with signed groups)."
    constraint_lines:
      - BRFO41_FRIS4A_0   # 2779 MVA — Bramford to Frieston
      - BRFO41_FRIS4B_0   # 2779 MVA — parallel circuit
      - BRFO41_FRIS4D_0   # 2779 MVA — parallel circuit
      - BURW41_WALP41_0   # 3326 MVA — Burwell to Walpole
      - BURW41_WALP41_1   # 3326 MVA — parallel circuit
    lines:
      - BRFO41_DISS4A_0   # 3326 MVA — Bramford to Diss
      - BRFO41_DISS4B_0   # 3326 MVA — parallel circuit
      - BRFO41_FRIS4A_0   # 2779 MVA — Bramford to Frieston
      - BRFO41_FRIS4B_0   # 2779 MVA — parallel circuit
      - BRFO41_FRIS4D_0   # 2779 MVA — parallel circuit
      - BURW41_WALP41_0   # 3326 MVA — Burwell to Walpole
      - BURW41_WALP41_1   # 3326 MVA — parallel circuit
      - DISS4A_YAXL41_0   # 3326 MVA — Diss to Yaxley (400kV)
      - DISS4B_YAXL41_0   # 3326 MVA — parallel circuit
      - NECT4A_WALP41_0   # 3326 MVA — Necton to Walpole (400kV)
      - NECT4B_WALP41_0   # 3326 MVA — parallel circuit
      - BICF41_WALP41_0   # 3189 MVA — Bicker Fen to Walpole
      - SPLN41_WALP41_0   # 3189 MVA — Spalding to Walpole
    flow_groups:
      # Positive means export across the full SSHARN loop toward the south/east
      # side of the figure. The Burwell/Necton/Diss/Bramford group needs a sign
      # flip relative to the Bicker Fen / Spalding approaches.
      positive:
        - BICF41_WALP41_0
        - SPLN41_WALP41_0
      negative:
        - BRFO41_DISS4A_0
        - BRFO41_DISS4B_0
        - BRFO41_FRIS4A_0
        - BRFO41_FRIS4B_0
        - BRFO41_FRIS4D_0
        - BURW41_WALP41_0
        - BURW41_WALP41_1
        - DISS4A_YAXL41_0
        - DISS4B_YAXL41_0
        - NECT4A_WALP41_0
        - NECT4B_WALP41_0

  # ── ESTEX: East Export boundary ────────────────────────────────────────────
  # Aggregate East Anglia export boundary. This overlaps with SSHARN, but the
  # aggregate-boundary formulation can now represent both without the old
  # uniform-s_max_pu overlap problem.
  ESTEX:
    description: "East Export boundary. Wider East Anglia export loop around Bramford/Diss/Necton."
    lines:
      - BRFO41_DISS4A_0   # 3326 MVA — Bramford to Diss
      - BRFO41_DISS4B_0   # 3326 MVA — parallel
      - BRFO41_FRIS4A_0   # 2779 MVA — Bramford to Frieston
      - BRFO41_FRIS4B_0   # 2779 MVA — parallel
      - BRFO41_FRIS4D_0   # 2779 MVA — parallel
      - DISS4A_YAXL41_0   # 3326 MVA — Diss to Yaxley
      - DISS4B_YAXL41_0   # 3326 MVA — parallel
      - NECT4A_WALP41_0   # 3326 MVA — Necton to Walpole
      - NECT4B_WALP41_0   # 3326 MVA — parallel
    flow_groups:
      # First-pass aggregate export direction from the inland Bramford/Necton
      # side toward the eastern/southern boundary edge.
      positive:
        - BRFO41_DISS4A_0
        - BRFO41_DISS4B_0
        - BRFO41_FRIS4A_0
        - BRFO41_FRIS4B_0
        - BRFO41_FRIS4D_0
        - DISS4A_YAXL41_0
        - DISS4B_YAXL41_0
        - NECT4A_WALP41_0
        - NECT4B_WALP41_0

  # ── SEIMP: South East Import boundary ─────────────────────────────────────
  # Provisional aggregate cut built from the SEIMPPR23 diagram. This is a
  # first-pass set of 400 kV inflow corridors into the South East / London
  # area from the Bramley, Cowley, Pelham, and Essex sides.
  SEIMP:
    description: "South East Import boundary. First-pass ETYS cut from Bramley/Cowley/Pelham/Essex into the South East."
    lines:
      - BRAI4A_BULL41_0   # 3066 MVA — Braintree to Bulls Lodge
      - BRAI4B_PELH41_0   # 2779 MVA — Braintree to Pelham
      - BRAI4B_RAYL41_0   # 2779 MVA — Braintree to Rayleigh
      - BULL41_RAYL41_0   # 2779 MVA — Bulls Lodge to Rayleigh
      - PELH41_WYMO41_0   # 2771 MVA — Pelham to Wymondley
      - BRLE41_WWEY4A_0   # 2199 MVA — Bramley to West Weybridge
      - BRLE41_WWEY4B_0   # 2199 MVA — parallel
      - COWL41_MITY41_0   # 1180 MVA — Cowley to Minety
      - COWL41_WALH41_0   # 1180 MVA — Cowley to Walham
    flow_groups:
      # First-pass import direction toward the South East / London side.
      positive:
        - BRAI4A_BULL41_0
        - BRAI4B_PELH41_0
        - BRAI4B_RAYL41_0
        - BULL41_RAYL41_0
        - PELH41_WYMO41_0
        - BRLE41_WWEY4A_0
        - BRLE41_WWEY4B_0
        - COWL41_MITY41_0
        - COWL41_WALH41_0

  # ── SWALEX: South Wales export boundary ───────────────────────────────────
  # Provisional aggregate cut from the SWALEX / RIGLOSLEX diagram around the
  # South Wales and Severn export routes into England.
  SWALEX:
    description: "South Wales export boundary. First-pass ETYS cut around Seabank/Melksham/Walham import routes from South Wales."
    lines:
      - PEMB41_WALH41_0   # 2779 MVA — Pembroke to Walham
      - CILF41_IMPP41_0   # 2779 MVA — Cilfynydd to Imperial Park
      - IMPP41_MELK41_0   # 1424 MVA — Imperial Park to Melksham
      - MELK41_MITY41_0   # 2105 MVA — Melksham to Minety
      - MELK41_MITY41_1   # 2105 MVA — parallel
      - MELK41_SEAB41_0   # 2545 MVA — Melksham to Seabank
      - HINP41_SEAB41_0   # 2009 MVA — Hinkley Point to Seabank
      - SAFO41_SEAB41_0   # 3190 MVA — Selling? / Saford? to Seabank
      - CILF41_WHSO4A_0   # 2779 MVA — Cilfynydd to Whitson
      - USKM21_WHSO21_0   # 1005 MVA — Uskmouth to Whitson
      - USKM21_WHSO22_0   # 1005 MVA — parallel
    flow_groups:
      # First-pass export direction from South Wales / Severn side toward the
      # English network.
      positive:
        - PEMB41_WALH41_0
        - CILF41_IMPP41_0
        - IMPP41_MELK41_0
        - MELK41_MITY41_0
        - MELK41_MITY41_1
        - MELK41_SEAB41_0
        - HINP41_SEAB41_0
        - SAFO41_SEAB41_0
        - CILF41_WHSO4A_0
        - USKM21_WHSO21_0
        - USKM21_WHSO22_0

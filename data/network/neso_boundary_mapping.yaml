      SSHARN_YORKSHIRE_HUMBER:
        description: "Expanded Norton / Greystones / Drax / Keadby / Cottam Yorkshire-Humber diagnostic proxy."
        lines:
          - DRAX41_FENW4A_0
          - DRAX41_EGGB42_0
          - DRAX41_THTO42_0
          - DRAX42_EGGB41_0
          - DRAX42_THOM41_0
          - DRAX42_THTO41_0
          - EGGB41_ROCH4A_0
          - EGGB41_THOM41_0
          - EGGB42_STSB4B_0
          - FENW4A_KEAD42_0
          - FENW4A_THOM42_0
          - GART4A_HUMR41_0
          - GART4A_KEAD43_0
          - GART4B_KEAD41_0
          - GART4B_KILL41_0
          - COTT41_KEAD4C_0
          - COTT41_KEAD4D_0
          - COTT41_STAY41_0
          - COTT42_STAY41_0
          - KEAD42_WBUR42_0

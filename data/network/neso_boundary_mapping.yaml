          - GRST2A_LACK2A_0
          - GRST2A_LACK2B_0
          - GRST2B_LACK2B_0
          - GRST2B_LACK2C_0
          - KILL41_HOWA41_0
          - KILL41_HOWA41_1
          - OSBA41_THTO43_0
          - OSBA42_THTO41_0
        flow_groups:
          positive:
            - DRAX41_FENW4A_0
            - DRAX41_EGGB42_0
            - DRAX42_THOM41_0
            - EGGB41_ROCH4A_0
            - EGGB41_THOM41_0
            - EGGB42_STSB4B_0
            - FENW4A_KEAD42_0

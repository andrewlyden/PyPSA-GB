      - HOWW35_HOWA21_0
      - HOWW36_HOWA21_0
      - LINO13_LINS11_0
      - LINO14_LINS12_0
      - LOFI4A_ROWD4A_0
      - LOFI4B_ROWD4B_0
      - PELH41_RYEH4A_0
      - PELH41_RYEH4B_0
      - PELH41_SUND42_0
      - PELH41_WYMO41_0
      - SPLN41_WALP41_0
    flow_groups:
      # Signs are oriented so positive is export from the East / South-East
      # area toward the rest of GB.
      positive:
        - BARK21_REBR22_0
        - BARK22_REBR21_0
        - BARK41_WHAM41_0
        - BARK41_WHAM41_1
        - CAMA11_IROA13_0
        - CAMA12_IROA12_0
        - DISS4A_YAXL41_0
        - DISS4B_YAXL41_0
        - HOWW33_HOWA21_0

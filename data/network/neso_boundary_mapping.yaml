  # ── ESTEX: East Export boundary ────────────────────────────────────────────
  # Wider East / South-East export area cut. The previous first-pass definition
  # used the Norfolk/Bramford internal export loop and isolated too small an
  # area relative to NESO ESTEX flows. This cut was rebuilt as a topology-based
  # area boundary around East Anglia, Essex, Kent, and the Thames corridor.
  # Positive means export from the East / South-East area toward the rest of GB.
  ESTEX:
    description: "East Export boundary. Wider East/South-East export area cut."
    lines:
      - BARK21_REBR22_0
      - BARK22_REBR21_0
      - BARK41_WHAM41_0
      - BARK41_WHAM41_1
      - BICF41_WALP41_0
      - BOLN41_NINF41_0
      - BOLN41_NINF41_1
      - CAMA11_IROA13_0
      - CAMA12_IROA12_0
      - DISS4A_YAXL41_0
      - DISS4B_YAXL41_0
      - HOWW33_HOWA21_0

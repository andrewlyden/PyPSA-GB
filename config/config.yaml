# Configuration is split into focused files:
#   config.yaml    - THIS FILE: What to run + global overrides
#   defaults.yaml  - Default values inherited by all scenarios
#   scenarios.yaml - Scenario definitions (only specify differences from defaults)
#   clustering.yaml - Clustering method presets and aggregation strategies

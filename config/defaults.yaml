# ══════════════════════════════════════════════════════════════════════════════
# PyPSA-GB Default Configuration
# ══════════════════════════════════════════════════════════════════════════════
# This file defines DEFAULT values inherited by all scenarios.
# Scenarios in scenarios.yaml only need to specify values that DIFFER from these.
# ══════════════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────────────
# TIMESTEP AND VOLL
# ──────────────────────────────────────────────────────────────────────────────
timestep_minutes: 60              # 60 = hourly, 30 = half-hourly
voll: 6000.0                      # Value of Lost Load (£/MWh)


# ──────────────────────────────────────────────────────────────────────────────
# SOLVER CONFIGURATION
# ──────────────────────────────────────────────────────────────────────────────
solver:
  name: "gurobi"                  # Options: gurobi, highs, glpk, cplex
  threads: 4
  method: 2                       # 0=primal, 1=dual, 2=barrier
  crossover: 0                    # 0=disabled (faster), -1=auto (enables crossover)
  BarHomogeneous: 1               # 1=enable homogeneous barrier (handles numerical issues)
  BarConvTol: 1.e-4               # Relaxed for numerical stability with large storage
  FeasibilityTol: 1.e-4           # Relaxed for numerical stability with large storage
  OptimalityTol: 1.e-4            # Relaxed for numerical stability with large storage
  NumericFocus: 3                 # 0-3, higher = more careful numerics (3=max)
  ScaleFlag: 2                    # 0-3, automatic scaling (2=aggressive)
  DualReductions: 0               # 0=disable (clearer error messages)
  BarIterLimit: 200               # Limit barrier iterations (default 1000); early termination governed by BarConvTol

# ──────────────────────────────────────────────────────────────────────────────
# OPTIMIZATION MODE
# ──────────────────────────────────────────────────────────────────────────────
# LP (Linear Programming):    Fast (~minutes), no unit commitment
# MILP (Mixed-Integer LP):    Slow (~hours), full unit commitment constraints
solve_mode: "LP"                # Options: "LP" or "MILP"

# ──────────────────────────────────────────────────────────────────────────────
# CLUSTERING (disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
# see the clustering.yaml file for detailed clustering presets and strategies
clustering:
  enabled: false

# ──────────────────────────────────────────────────────────────────────────────
# COMPONENT AGGREGATION (disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
# Merges identical generators/storage/loads at the same bus after clustering,
# summing their capacities. Components must have matching attributes and
# time series to be merged. Independent of clustering config.
component_aggregation:
  enabled: false
  include_generators: false          # Aggregate identical thermal generators
  include_storage_units: false      # Aggregate storage units when possible
  include_loads: false              # Aggregate loads per bus
  include_stores: false             # Aggregate Store components (rarely used)
  include_committable: false        # Allow committable unit merging
  tolerance: 1.0e-9                 # Float comparison tolerance

# ──────────────────────────────────────────────────────────────────────────────
# RENEWABLE AGGREGATION (disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
# Merges renewable generators at the same bus and carrier into a single
# representative generator, using capacity-weighted average p_max_pu profiles.
# Dramatically reduces generator count (e.g. thousands of REPD sites → one per
# bus) without changing optimization results. Independent of spatial clustering.
renewable_aggregation:
  enabled: false
  carriers:                        # Carriers eligible for aggregation
    - wind_onshore
    - wind_offshore
    - solar_pv
    - large_hydro
    - small_hydro
    - tidal_stream
    - shoreline_wave
    - tidal_lagoon

# ──────────────────────────────────────────────────────────────────────────────
# RENEWABLE PERFORMANCE FACTORS (ERA5 bias + turbine model correction)
# ──────────────────────────────────────────────────────────────────────────────
# ERA5 reanalysis and idealised turbine power curves (NREL_5MW offshore,
# Vestas_V112_3MW onshore) systematically overstate the available generation
# from real UK wind and solar fleets. These factors downscale p_max_pu profiles
# to represent realistic uncurtailed availability — they must NOT include
# curtailment effects (network constraints are handled by the BM stage).
#
# CALIBRATION TARGET: the model's wholesale (pre-BM) wind generation should
# approximate ESPENI metered output + estimated real curtailment. Performance
# factors should NOT be tuned to match ESPENI directly, because that would bake
# real curtailment into the resource — leaving the BM with insufficient wind
# to curtail and breaking the two-stage architecture.
#
# Factors are decomposed into distinct physical mechanisms so each can be
# reasoned about, calibrated, and tested independently:
#
#   era5_bias:        ERA5 reanalysis wind speed / irradiance overestimate
#   turbine_curve:    Idealised power curve vs real fleet efficiency
#   wake_losses:      Farm-scale wake interactions (absent from atlite)
#   availability:     Maintenance, faults, grid connection downtime
#
# The effective factor applied to each carrier is the PRODUCT of all four
# components. For example:
#   wind_offshore: 0.83 × 0.93 × 0.90 × 0.93 = 0.645
#   wind_onshore:  0.91 × 0.95 × 0.98 × 0.95 = 0.805
#   solar_pv:      0.95 × 0.97 × 1.00 × 0.95 = 0.875
#
# If 'factors' is provided (flat dict, e.g. {wind_offshore: 0.82}), it is used
# directly as the effective factor for backward compatibility, and the stacked
# components are ignored.
#
# References: Staffell & Pfenninger (2016) doi:10.1016/j.energy.2016.08.004;
#             Bloomfield et al. (2020) doi:10.1002/met.1858;
#             Barthelmie et al. (2010) doi:10.1002/we.348 (wake losses)
#
# Diagnostic: run scripts/generators/calibrate_wind_profiles.py to compare
# ERA5 totals against ESPENI metered output (see that script for caveats about
# curtailment confounding the ESPENI comparison).
renewable_performance_factors:
  enabled: true                    # Apply ERA5 bias-correction factors during generator build

  # Option A (preferred): stacked component factors — product is applied per carrier.
  # Each component addresses one physical loss mechanism.
  era5_bias:                       # ERA5 reanalysis wind speed / irradiance overestimate
    wind_offshore: 0.83            # North Sea ~+15% speed → ~+20% power (1/1.20≈0.83)
    wind_onshore:  0.91            # UK onshore ~+7% speed → ~+10% power (1/1.10≈0.91)
    solar_pv:      0.95            # ERA5 SSRD small positive bias ~+3–5%

  turbine_curve:                   # Idealised power curve vs real fleet efficiency
    wind_offshore: 0.93            # NREL_5MW ideal vs real fleet (−5 to 7%)
    wind_onshore:  0.95            # Vestas_V112 ideal vs real fleet (~−5%)
    solar_pv:      0.97            # Module temperature de-rating + inverter losses

  wake_losses:                     # Farm-scale wake interactions (not modelled in atlite)
    wind_offshore: 0.90            # 5–15% depending on farm size/spacing
    wind_onshore:  0.98            # 1–3% (wider spacing, less dense farms)
    solar_pv:      1.00            # N/A for solar

  availability:                    # Maintenance, faults, grid connection downtime
    wind_offshore: 0.93            # 5–8% downtime (subsea cable, harsh environment)
    wind_onshore:  0.95            # 3–6% downtime
    solar_pv:      0.97            # 2–4% downtime (soiling, inverter faults)

  # Option B (backward-compatible): flat override factors.
  # If 'factors' is provided and non-empty, it is used AS-IS and stacked
  # components above are IGNORED. Uncomment to use:
  # factors:
  #   wind_offshore: 0.82
  #   wind_onshore:  0.80
  #   solar_pv:      0.88


# ──────────────────────────────────────────────────────────────────────────────
# EMBEDDED GENERATION CORRECTION (historical scenarios only)
# ──────────────────────────────────────────────────────────────────────────────
# REPD does not include small-scale/rooftop solar (or embedded wind) that
# connects below the transmission level. TOTAL_ESPENI already INCLUDES this
# embedded generation (energy balance: metered gen + net imports + embedded =
# TOTAL_ESPENI), but the model has no generators representing it.
#
# When enabled this feature:
#   1. Reads measured embedded solar (& optionally wind) from the ESPENI
#      NGEM columns for the demand_year
#   2. Saves the MW timeseries to resources/demand/{scenario}_embedded_{carrier}.csv
#   3. Subtracts the modelled output of REPD generators already in the network
#      (solar_pv for solar, wind_onshore for wind) to avoid double-counting —
#      NGEM_EMBEDDED_SOLAR includes ALL solar (there is no ELEX solar column)
#   4. Creates embedded_solar (/ embedded_wind) generators for the residual gap,
#      representing rooftop / small-scale capacity not captured by REPD
#
# Demand is NOT changed.
embedded_generation:
  enabled: true                   # Set true to activate
  solar: true                      # Include embedded solar from ESPENI
  wind: true                      # Include embedded wind from ESPENI
  wind_overlap_exclusion:
    enabled: false                 # Validation option: exclude small REPD onshore wind from ELEX_WIND bucket
    max_capacity_mw: 10.0          # Sites <= this are represented by ESPENI embedded_wind instead

# ──────────────────────────────────────────────────────────────────────────────
# SOLVE PERIOD (full year by default)
# ──────────────────────────────────────────────────────────────────────────────
solve_period:
  enabled: false                  # Set true to solve subset of year

# ──────────────────────────────────────────────────────────────────────────────
# TRANSMISSION CONSTRAINTS
# ──────────────────────────────────────────────────────────────────────────────
# For detailed networks (ETYS), actual line ratings may be too restrictive.
# These settings allow relaxing transmission constraints for feasibility.
transmission:
  # Minimum line capacity in MVA (lines below this are set to this value)
  min_line_s_nom: 0               # 0 = use actual ratings
  # Minimum transformer capacity in MVA  
  min_transformer_s_nom: 0        # 0 = use actual ratings
  # Scaling factor for all line/transformer capacities (1.0 = no change)
  capacity_scale: 1.0             # 1.0 = no scaling (use clustering instead)
  # Minimum voltage (kV) for BM line constraints.
  # Lines with v_nom strictly below this threshold have their s_nom set to 9999 MVA
  # (effectively unconstrained) before the BM solve.
  #
  # Rationale: ETYS Appendix B captures individual 132 kV trunk segments but omits
  # the parallel 33/66 kV sub-transmission mesh and ring paths that exist in the real
  # network.  The DC power flow distributes loop currents through these radial segments
  # with no alternative path, saturating them at unrealistically low levels.  NESO
  # manages 132 kV loop flows through operational tools (phase-shifters, local BM
  # actions) that this model cannot replicate.  Removing 132 kV constraints is
  # consistent with the NESO boundary-flow data being published at inter-zone level
  # (≥275 kV), where local intra-zone constraints are assumed handled separately.
  #
  # Set to 0 to disable (use raw ETYS ratings for all voltage levels).
  # Set to 220 to relax all 132 kV and below (recommended default).
  # Set to 275 to also relax 220 kV lines (more aggressive).
  min_bm_constraint_voltage_kv: 220

  # Per-line s_nom overrides — correct known ETYS data errors or targeted exceptions.
  # Format: { line_id: corrected_s_nom_mva }.  Applied in both the solve
  # step and the balancing mechanism (after loading, before optimisation).
  # Explicit overrides take precedence over min_bm_constraint_voltage_kv.
  line_rating_overrides:
    CHAP1-_ECCF1J_0: 120         # ETYS lists 18 MVA — likely 132kV/11kV misentry
    MAHI3-_TRLO3-_0: 9999        # 33kV artifact: 81 MW wind behind 40 MVA sub-transmission
    GLGL3-_WHLL3-_0: 9999        # 33kV artifact: 70 MW wind behind 30 MVA sub-transmission
    HARR3-_KYPE3A_0: 9999        # 33kV artifact: 72 MW wind behind 40 MVA sub-transmission

  # ── Transmission Outage Schedule ────────────────────────────────────────────
  # Applies transmission outage effects. Without outages the model sees
  # full intact-network capacity and under-estimates constraint costs
  # (e.g. NESO 2020 thermal constraints = £596M, model intact-only ≈ £126M).
  #
  # Three modes:
  #   "csv"       — load from a user-supplied CSV file
  #   "synthetic" — generate stochastic outages from parameters below
  #   "neso"      — apply NESO day-ahead boundary limits
  outage_schedule:
    enabled: false                # Master toggle
    source: "neso"                 # "csv" | "synthetic" | "neso"

    # ── NESO mode ─────────────────────────────────────────────────────────────
    # Fetches real NESO Day-Ahead Constraint Flows & Limits data from the API.
    # The same NESO source data can be enforced in two different ways:
    #   uniform_s_max_pu:
    #       Convert each boundary limit into a uniform percentage derate and
    #       apply that same s_max_pu to every mapped line in the boundary.
    #       This is the legacy method and assumes each line shares the
    #       boundary restriction in proportion to its s_nom.
    #   aggregate_boundary:
    #       Keep the normal per-line thermal limits, but add an optimisation
    #       constraint so the signed total flow across the mapped boundary cut
    #       stays within the NESO limit. This is usually the better match to
    #       what the NESO dataset is actually publishing.
    # These limits already include N-1/N-2 security margins and real outages.
    # Source: https://www.neso.energy/data-portal/day-ahead-constraint-flows-and-limits
    neso:
      boundary_mapping: "data/network/neso_boundary_mapping.yaml"
      resource_id: "38a18ec1-9e40-465d-93fb-301e80fd1352"
      api_base: "https://api.neso.energy/api/3/action/datastore_search_sql"
      cache_dir: "resources/neso_cache"   # Cache fetched data locally
      constraint_mode: "aggregate_boundary" # "uniform_s_max_pu" | "aggregate_boundary"
      nearest_tolerance_minutes: 45       # Direct timestamp match window before gap filling
      gap_fill_mode: "interpolate"        # "interpolate" | "nearest_available" | "unconstrained" | "fail"
                                          # interpolate = use surrounding NESO data, then edge-fill if needed
      min_s_max_pu: 0.05                  # Uniform mode only: floor to prevent near-zero line capacity
      soft_boundaries: {}                 # Optional aggregate-boundary slack, keyed by boundary name:
                                          #   SEIMP:
                                          #     enabled: true
                                          #     penalty_gbp_per_mwh: 1000
                                          #     max_violation_mw: 2500

    # ── Synthetic mode ────────────────────────────────────────────────────────
    # Generates random maintenance outages based on typical GB transmission patterns.
    # Only applied to lines/transformers above min_s_nom_mva.
    synthetic:
      seed: 42                    # Random seed for reproducibility
      min_s_nom_mva: 100          # Only schedule outages on lines >= this rating
      # Annual forced outage rate (fraction of hours unavailable per year)
      forced_outage_rate:
        400: 0.03                 # 400kV: ~3% unavailability (263 hours/year)
        275: 0.04                 # 275kV: ~4%
        132: 0.05                 # 132kV: ~5%
      # Average maintenance window duration (hours)
      maintenance_duration_hours: 168   # 1 week typical
      # Seasonal weighting — more maintenance in low-demand months
      seasonal_weights:
        1: 0.4                    # January (winter — minimal maintenance)
        2: 0.5
        3: 0.8
        4: 1.2                    # April (spring shoulder)
        5: 1.5
        6: 1.8                    # June (summer — peak maintenance)
        7: 1.8
        8: 1.5
        9: 1.2                    # September
        10: 0.8
        11: 0.5
        12: 0.3                   # December (winter — minimal)

# ──────────────────────────────────────────────────────────────────────────────
# MARKET SIMULATION (disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
# Two-stage market dispatch: wholesale clearing + balancing mechanism redispatch.
# Stage 1 (Wholesale): Copperplate dispatch — no network constraints, uniform price.
# Stage 2 (Balancing): Redispatch — full network constraints, generators
#   and storage adjust from wholesale position at bid/offer prices.
#
# Requires a finalized network ({scenario}.nc) from the main workflow.
# Run via: snakemake -s Snakefile_market --cores 4
# Or integrated with main workflow when market.enabled: true in a scenario.
market:
  enabled: false                          # Master toggle for market simulation
  wholesale_only: false                   # If true, run only wholesale (no balancing/analysis)

  # ── Stage 1: Wholesale Market ──────────────────────────────────────────────
  wholesale:
    # Dispatch mode:
    #   "single"              - Solve entire period in one LP (current default)
    #   "rolling_day_ahead"   - Solve in rolling windows (day-ahead market)
    #     Each window is optimised independently; storage SoC carries between
    #     windows when carry_soc is true.  Produces more realistic day-ahead
    #     scheduling since generators/storage can only see window_hours ahead.
    mode: "single"
    window_hours: 24                      # Hours per window (rolling_day_ahead mode)
    carry_soc: true                       # Carry storage SoC between windows

    # s_nom value (MVA) applied to ALL lines and transformers to create
    # copperplate (unconstrained) dispatch. Must be >> max line flow.
    transmission_relaxation: 1.0e6

    # Optional Stage 1 unit commitment overlay. This is independent of the
    # global solve_mode so the wholesale schedule can be MILP while BM remains
    # an anchored LP. Disabled by default because it is slower.
    unit_commitment:
      enabled: false
      min_p_nom_mw: 50.0
      initial_status: "off"              # "off" | "on" | "preserve"
      default_ramp_limit_up: 1.0
      default_ramp_limit_down: 1.0
      default_ramp_limit_start_up: 1.0
      default_ramp_limit_shut_down: 1.0
      exclude_carriers:
        - "load_shedding"
        - "EU_import"
        - "wind_onshore"
        - "wind_offshore"
        - "solar_pv"
        - "embedded_solar"
        - "embedded_wind"
      carrier_parameters:
        CCGT:
          enabled: true
          p_min_pu: 0.35
          min_up_time: 4
          min_down_time: 3
          ramp_limit_up: 0.50
          ramp_limit_down: 0.50
          start_up_cost_per_mw: 45.0
          shut_down_cost_per_mw: 0.0
        OCGT:
          enabled: true
          p_min_pu: 0.20
          min_up_time: 1
          min_down_time: 1
          ramp_limit_up: 1.0
          ramp_limit_down: 1.0
          start_up_cost_per_mw: 20.0
          shut_down_cost_per_mw: 0.0
        coal:
          enabled: true
          p_min_pu: 0.40
          min_up_time: 8
          min_down_time: 6
          ramp_limit_up: 0.35
          ramp_limit_down: 0.35
          start_up_cost_per_mw: 80.0
          shut_down_cost_per_mw: 0.0
        oil:
          enabled: true
          p_min_pu: 0.25
          min_up_time: 2
          min_down_time: 2
          ramp_limit_up: 0.80
          ramp_limit_down: 0.80
          start_up_cost_per_mw: 30.0
          shut_down_cost_per_mw: 0.0

  # ── Stage 2: Balancing Mechanism ───────────────────────────────────────────
  balancing:
    # Dispatch mode:
    #   "full_period"   - Solve entire period in one LP (current default)
    #   "rolling"       - Solve in rolling windows, each anchored to wholesale
    #     window_hours=1 gives per-timestep BM (most realistic for gas/nuclear).
    #     window_hours=24 gives per-day BM (better for storage SoC tracking).
    #     Storage SoC carries between windows automatically.
    mode: "full_period"
    window_hours: 1                       # Hours per window (rolling mode only)
    # How bid/offer prices are determined:
    #   "auto"    - Prefer ELEXON for historical scenarios when files exist, else derived
    #   "derived" - Calculated from generator marginal_cost ± markup/discount
    #   "elexon"  - Actual ELEXON BMRS bid/offer data (historical scenarios only)
    #   "csv"     - Load from external CSV files (custom/research use)
    bid_offer_source: "auto"

    # Default fractional markup/discount applied to marginal_cost
    # offer_price = marginal_cost * (1 + default_offer_markup)
    # bid_price   = marginal_cost * (1 - default_bid_discount)
    # No floors or ceilings are applied to BM bid/offer prices.
    default_offer_markup: 0.10            # 10% above marginal_cost for offers (increase output)
    default_bid_discount: 0.10            # 10% below marginal_cost for bids (decrease output)

    # ── Carrier-specific bid/offer pricing models ─────────────────────────────
    # Two pricing modes per carrier:
    #   "markup"   (default) — offer = mc × (1 + offer_markup), bid = mc × (1 - bid_discount)
    #   "absolute" — offer = offer_price, bid = bid_price (fixed £/MWh values)
    #
    # Absolute prices capture strategic BM bidding that markup models miss:
    #   - Nuclear bids very high to avoid being turned down (restart cost)
    #   - Wind/solar bids reflect lost subsidy value (ROC/CfD)
    #   - CCGTs in constrained zones bid well above MC
    #
    # Bid prices are in "ESO cost" convention: positive = costs ESO to decrease.
    carrier_overrides:
      nuclear:
        mode: "absolute"
        offer_price: 999.0                # Nuclear almost never offers up in BM
        bid_price: 150.0                  # Very expensive to turn down (restart cost)
      CCGT:
        mode: "markup"
        offer_markup: 0.85                # ELEXON median offer/MC ratio ≈ 1.86 (was 0.50)
        bid_discount: 0.10                # Moderate cost to turn down
      OCGT:
        mode: "markup"
        offer_markup: 1.30                # ELEXON median offer/MC ratio ≈ 2.30 (was 0.30)
        bid_discount: 0.10
      coal:
        mode: "absolute"
        offer_price: 200.0                # ELEXON coal offers highly strategic (median £1136)
        bid_price: 150.0                  # Coal slow to restart → high bid to reduce
      oil:
        mode: "markup"
        offer_markup: 0.20
        bid_discount: 0.10
      biomass:
        mode: "absolute"
        offer_price: 120.0                # Biomass CHP offer price
        bid_price: 80.0                   # CHP must-run → expensive to turn down
      wind_onshore:
        mode: "absolute"
        offer_price: 0.0                  # Cannot offer more than available
        bid_price: 25.0                   # ELEXON median ≈ £25 (was £45)
      wind_offshore:
        mode: "absolute"
        offer_price: 0.0
        # Weighted average: ~40% ROC (2.0×£50=£100) + ~60% CfD (avg ~£80)
        # For historical scenarios with legacy high-strike projects
        bid_price: 90.0                   # Higher than onshore due to CfD strikes + higher ROC
      solar_pv:
        mode: "absolute"
        offer_price: 0.0
        bid_price: 55.0                   # Lost ROC subsidy (1.2 × £50 buyout ~ £60)
      embedded_solar:
        mode: "absolute"
        offer_price: 0.0
        bid_price: 30.0                   # Embedded solar — lower subsidy exposure
      embedded_wind:
        mode: "absolute"
        offer_price: 0.0
        bid_price: 40.0
      large_hydro:
        mode: "absolute"
        offer_price: 50.0                 # ELEXON median ≈ £51 (was £0)
        bid_price: 5.0                    # Water is free — low cost to curtail
      small_hydro:
        mode: "absolute"
        offer_price: 0.0
        bid_price: 30.0                   # Small hydro may have FiT/ROC
      waste_to_energy:
        mode: "absolute"
        offer_price: 120.0
        bid_price: 80.0                   # Must-run due to waste contracts
      landfill_gas:
        mode: "absolute"
        offer_price: 100.0
        bid_price: 60.0                   # Must-run (gas flaring alternative)
      sewage_gas:
        mode: "absolute"
        offer_price: 100.0
        bid_price: 60.0
      biogas:
        mode: "absolute"
        offer_price: 110.0
        bid_price: 70.0
      advanced_biofuel:
        mode: "absolute"
        offer_price: 130.0
        bid_price: 80.0
      # ── Storage carriers ────────────────────────────────────────────────────
      # Storage units in BM: positive net dispatch = discharging (offers up),
      # negative net dispatch = charging (bids down from wholesale position).
      # Pumped storage actively participates in BM for frequency response and
      # constraint management. Battery storage increasingly participates too.
      Pumped Storage Hydroelectricity:
        mode: "absolute"
        offer_price: 50.0                 # PSH offer to generate — competitive with CCGT (~£54)
        bid_price: 60.0                   # PSH bid to pump (reduce generation)
      pumped_hydro:
        mode: "absolute"
        offer_price: 50.0                 # PSH offer to generate — competitive with CCGT (~£54)
        bid_price: 60.0
      battery:
        mode: "absolute"
        offer_price: 120.0                # Battery offer (faster response premium)
        bid_price: 50.0                   # Battery bid (reduce discharge / charge)
      Battery:
        mode: "absolute"
        offer_price: 120.0
        bid_price: 50.0
      Domestic Battery:
        mode: "absolute"
        offer_price: 100.0                # Aggregated domestic battery
        bid_price: 40.0
      LAES:
        mode: "absolute"
        offer_price: 150.0                # Liquid air — less efficient
        bid_price: 60.0
      CAES:
        mode: "absolute"
        offer_price: 80.0                 # Compressed air — lower cost
        bid_price: 40.0

    # ── Minimum stable generation (must-run constraints) ─────────────────────
    # Applied only in Stage 2 (BM).  Prevents the LP from turning off baseload
    # ── Marginal cost floors (£/MWh) ──────────────────────────────────────────
    # Safety net for generators that end up with zero MC after the cost
    # application pipeline.  Applied in BM pre-solve only.  Zero-cost
    # dispatchable generators create unrealistic dispatch (dispatched first,
    # never curtailed).  These floors do NOT override positive MCs.
    mc_floors:
      biogas: 55.0                          # Biogas CHP fuel + O&M
      landfill_gas: 40.0                    # Landfill gas O&M
      sewage_gas: 45.0                      # Sewage gas O&M
      waste_to_energy: 30.0                 # Gate fee offsets some cost
      advanced_biofuel: 60.0                # Advanced biofuel fuel cost
      oil: 90.0                             # Oil-fired plant fuel cost
      OCGT: 80.0                            # Gas turbine fuel cost
      CCGT: 50.0                            # Combined cycle fuel cost
      coal: 40.0                            # Coal fuel cost

    # Fix interconnectors at their wholesale position in the BM solve
    # true  = ICs cannot be redispatched (v1 default)
    # false = ICs participate in BM (future extension)
    fix_interconnectors: true

    # Optional BM participation filter.
    # Use this when you do NOT want the whole PyPSA fleet to behave like BM units.
    # Modes:
    #   generators.mode / storage_units.mode:
    #     "all"           - every asset can redispatch (current default)
    #     "none"          - no assets in that class participate
    #     "elexon_mapped" - only directly BMU-mapped generators participate
    # Filters are then applied on top:
    #   min_p_nom_mw, include_carriers, exclude_carriers, include_names, exclude_names
    # Behaviours for non-participants:
    #   "priced_out"       - keep feasible emergency redispatch, but at penalty prices
    #   "fallback_priced"  - keep feasible redispatch at the normal derived/ELEXON fallback prices
    #   "fixed"            - lock at wholesale position (more realistic, but can be infeasible)
    participation:
      generators:
        mode: "all"
        behavior: "priced_out"
        min_p_nom_mw: 0.0
        include_carriers: []
        exclude_carriers: []
        include_names: []
        exclude_names: []
        penalty_offer_price: 5000.0
        penalty_bid_price: 5000.0
      storage_units:
        mode: "all"
        behavior: "priced_out"
        min_p_nom_mw: 0.0
        include_carriers: []
        exclude_carriers: []
        include_names: []
        exclude_names: []
        penalty_offer_price: 5000.0
        penalty_bid_price: 5000.0

    # ── ELEXON source config (only used when bid_offer_source: "elexon") ────
    elexon:
      # {scenario} is expanded at runtime — BOD data stored per-scenario, separate
      # from shared calibration caches in resources/market/elexon/
      data_dir: "resources/market/{scenario}/elexon"  # Where ELEXON BOD CSVs are stored
      raw_bod_cache_dir: "data/market/elexon_bod" # Persistent raw daily BOD cache, shared across scenarios
      processed_bod_cache_dir: "data/market/elexon_processed" # Reusable processed range cache shared across scenarios
      raw_bod_cache_format: "parquet" # Prefer compact, faster daily BOD cache files; legacy CSV is still read
      convert_legacy_csv: true        # Write Parquet beside existing CSV daily caches after reading them
      parallel_days: 4                # Parallel daily aggregation when all raw BOD days are already cached
      bmu_mapping: "resources/generators/{scenario}_bmu_mapping.csv" # BMU ID → generator name mapping
      # Optional local Power Station Dictionary crosswalk used when building
      # the BMU mapping. If the file exists, explicit BMU rows and station
      # aliases are used ahead of prefix heuristics.
      power_station_dictionary: "data/generators/power_station_dictionary_bmu_crosswalk.csv"
      fallback: "carrier_average"        # For unmatched generators: "carrier_average", "derived", or "zero"
      storage_price_aggregation: "median"  # Robust cross-BMU aggregation for storage traces
      price_ladders:
        enabled: false                   # Opt-in: use BOD price/volume blocks in BM solve
        offer_file: "elexon_offer_ladders.csv"
        bid_file: "elexon_bid_ladders.csv"
        max_blocks_per_side: 10          # Keep cheapest N-1 blocks, aggregate the tail into block N
        missing_hour_fallback: true      # Use the averaged ELEXON price if a mapped BMU has no ladder row in an hour
        fallback_volume_mw: 1000000.0    # Non-binding fallback block volume; inc/dec variables remain physically bounded
      storage_bmu_prefixes:
        Pumped Storage Hydroelectricity:
          - "T_CRUA"
          - "T_CRUAD"
          - "T_FOYE"
          - "T_FOYED"
          - "T_DINO"
          - "T_FFES"
          - "T_FFESST"
        pumped_hydro:
          - "T_CRUA"
          - "T_CRUAD"
          - "T_FOYE"
          - "T_FOYED"
          - "T_DINO"
          - "T_FFES"
          - "T_FFESST"

    # ── CSV source config (only used when bid_offer_source: "csv") ──────────
    csv:
      offer_file: null                   # Path to offer prices CSV (generator × snapshot)
      bid_file: null                     # Path to bid prices CSV (generator × snapshot)

    # ── Calibration scorecard (historical ELEXON scenarios only) ────────────
    # validate_bm_calibration rule compares per-carrier model effective
    # bid/offer prices against ELEXON BOD medians, and model redispatch
    # volumes against BOALF unflagged (constraint-only) volumes. Carriers
    # with non-trivial volume that drift beyond `tolerance` are flagged.
    calibration:
      tolerance: 0.20                    # |ratio - 1| that flags a carrier (0.20 = ±20%)
      min_volume_mwh: 1000.0             # Carriers below this on either side are skipped
      fail_on_regression: false          # When true, the rule errors out on any flagged carrier

    # ── Fitted fallback from ELEXON (historical scenarios) ──────────────────
    # When enabled, fallback pricing for generators without a direct BMU
    # match is derived from a per-carrier regression against ELEXON-matched
    # BMUs (offer = α·MC + β, bid = γ·MC + δ). This preserves intra-carrier
    # MC dispersion that the carrier-median fallback collapses.
    #
    # Falls back to the configured `elexon.fallback` (carrier_average/
    # derived/zero) when a carrier has fewer than `min_matched_gens`
    # ELEXON matches or the fit R² is below `min_r2`.
    #
    # `time_varying_shape` overlays the carrier-mean-normalised ELEXON
    # hourly profile on unmatched generators, so a generator gets the same
    # peak-vs-offpeak shape as the matched fleet in its carrier.
    fitted_fallback:
      enabled: false                     # Opt-in; leave off until validated per-scenario
      min_matched_gens: 3                # Minimum ELEXON-matched gens for a carrier fit
      min_r2: 0.1                        # R² threshold below which the fit is discarded
      max_price: 500.0                   # Same sanity cap as carrier_average (£/MWh)
      time_varying_shape: true           # Apply carrier-mean-normalised hourly ELEXON shape

  # ── Post-Solve Revenue Tracking ──────────────────────────────────────────
  # Calculates CfD difference payments and ROC income after market solve.
  # Requires market.enabled: true AND subsidy_tracking.enabled: true.
  revenue_tracking:
    enabled: false                        # Master toggle
    include_cfd: true                     # Calculate CfD top-up/clawback payments
    include_roc: true                     # Calculate ROC income
    output_format: "csv"                  # "csv", "json", or "both"

# ──────────────────────────────────────────────────────────────────────────────
# HYDRO / PUMPED-HYDRO MODEL
# ──────────────────────────────────────────────────────────────────────────────
# Large hydro is reservoir-backed rather than fuel-backed. The model therefore
# uses an hourly power ceiling from the profile plus a cumulative water budget
# that carries between rolling windows.
#
# Pumped hydro is not a generic battery. Reservoir losses are negligible at
# hourly resolution, and keeping a minimum SOC improves retained flexibility
# for balancing and fast-response operation.
hydro:
  enabled: true
  large_hydro:
    reservoir_model: true
    inflow_profile_factor: 0.55          # Convert p_max_pu profile into effective inflow
    initial_storage_hours: 48.0          # Water already in reservoir at period start
    reservoir_capacity_hours: 168.0      # Approximate upper-reservoir energy capacity
  pumped_hydro:
    standing_loss: 0.0                   # Reservoir leakage is negligible at hourly scale
    initial_soc_fraction: 0.65           # Start with the upper reservoir partly full
    min_soc_fraction: 0.15               # Preserve headroom for redispatch services
    wholesale_min_soc_fraction: 0.40     # Higher floor in wholesale — preserves SoC for BM increases
    final_soc_fraction: null             # Optional end-of-horizon reserve target
    cyclic_state_of_charge: false

# ──────────────────────────────────────────────────────────────────────────────
# ETYS DATA SOURCE (ETYS network model only)
# ──────────────────────────────────────────────────────────────────────────────
# Selects which ETYS publication year to use for base network topology.
# Available: 2022, 2023, 2024
etys:
  year: 2024                       # ETYS publication year

# ──────────────────────────────────────────────────────────────────────────────
# ETYS NETWORK UPGRADES (ETYS network model only)
# ──────────────────────────────────────────────────────────────────────────────
# Applies planned network infrastructure upgrades from the selected ETYS data.
# Includes circuit additions/removals, transformer changes, and new HVDC links.
# Only applies when network_model: "ETYS"
etys_upgrades:
  enabled: true                  # Set false to not apply network upgrades
  # Year through which to apply upgrades (null = use modelled_year)
  # Example: If modelled_year is 2035, apply all upgrades through 2035
  upgrade_year: null              # null, or specific year like 2030

# ──────────────────────────────────────────────────────────────────────────────
# SPATIAL MAPPING PARAMETERS
# ──────────────────────────────────────────────────────────────────────────────
# Controls how generators and other sites are mapped to network buses.
# Changes here affect bus assignment for all generator types.
# ──────────────────────────────────────────────────────────────────────────────
spatial_mapping:
  # Coordinate system detection thresholds
  # (distinguish OSGB36 metres from WGS84 degrees)
  coordinate_detection:
    osgb36_min_value: 1000        # x or y > 1000 → OSGB36 (metres)
    wgs84_max_absolute: 100       # x and y < 100 → WGS84 (degrees)

  # Transmission operator latitude boundaries (degrees N, WGS84)
  # SHETL: Northern Scotland (lat > shetl_lat_min)
  # SPTL: Southern Scotland (sptl_lat_min < lat ≤ shetl_lat_min)
  # NGET: England & Wales (lat ≤ sptl_lat_min)
  transmission_regions:
    shetl_lat_min: 57.0
    sptl_lat_min: 55.5

  # Maximum bus-mapping distances (km) — sites beyond these limits are
  # mapped to the nearest bus regardless (fallback, no hard cutoff)
  distance_km:
    site_to_bus: 200.0            # General site → nearest bus
    gsp_to_bus: 100.0             # GSP coordinate → nearest bus
    thermal_generator: 150.0      # Thermal gen OSGB → nearest bus

  # Fuzzy string matching score threshold (0–1)
  fuzzy_threshold: 0.8

  # Fallback: top-N most-connected buses used when no major bus is found
  fallback_major_bus_count: 10

  # Generator voltage-correction thresholds
  # Controls when a generator is moved to a higher-voltage bus
  generator_voltage:
    min_check_mw: 50              # Skip bus check below this capacity (MW)
    very_large_mw: 300            # Must connect at ≥ min_preferred_kv (MW)
    large_low_voltage_mw: 200     # Must NOT connect at ≤ low_voltage_kv (MW)
    medium_mw: 100                # Needs transformer capacity check (MW)
    max_transformer_ratio: 0.8    # Max generator / transformer s_nom ratio
    min_preferred_kv: 275         # Preferred minimum connection voltage (kV)
    high_voltage_kv: 400          # 400 kV-only search threshold (kV)
    low_voltage_kv: 33            # Low-voltage threshold (kV)
    fallback_hv_radius_km: 80     # Max km for post-aggregation nearest HV bus search

  # Earth radius for haversine distance calculations
  earth_radius_km: 6371.0

# ──────────────────────────────────────────────────────────────────────────────
# MARGINAL COST DEFAULTS
# ──────────────────────────────────────────────────────────────────────────────
# Historical scenarios (<=2024) automatically use built-in historical lookup tables.
# Future scenarios (>2024) use these defaults unless overridden in scenarios.yaml.
# ──────────────────────────────────────────────────────────────────────────────

marginal_costs:
  # Nuclear MC override (ELEXON bid prices reflect strategic behaviour, not SRMC)
  nuclear_mc: 10.0

  # Default fuel prices (used when historical tables and FES data are unavailable)
  fuel_prices:
    gas: 35.0
    coal: 30.0
    oil: 75.0
    biomass: 45.0

  # Default carbon price
  carbon_price: 85.0

  # Use built-in historical lookup tables for modelled_year <= 2024
  use_historical_data: true

  # Use FES-extracted prices for future scenarios (>2024)
  use_fes_prices: true

  # ── Carrier Correction Factors ───────────────────────────────────────────────
  # When enabled, loads pre-computed correction factors from a CSV file.
  # These factors scale formula MCs to match real-world dispatch costs,
  # derived from historical ELEXON calibration (e.g., CCGT ≈ 0.62).
  # Useful for future scenarios where per-generator ELEXON data is unavailable.
  # Generate the file: python scripts/generators/export_correction_factors.py
  carrier_correction_factors:
    enabled: false                       # Default off for backward compat
    file: "data/market/historical_carrier_correction_factors.csv"
    source_year: "closest"               # "closest" | "median" | specific year (e.g. 2023)
    fallback: 1.0                        # Factor when carrier not in file

  # ── Empirical Calibration (ELEXON data) ────────────────────────────────────
  # When enabled, calibrates per-generator thermal MCs  and renewable MCs
  # from ELEXON data. Carrier correction factors are derived inline.
  empirical_calibration:
    enabled: false
    window_days: 7                       # Rolling window half-width for thermal calibration
    # Additive MC adjustments per carrier (£/MWh), applied AFTER empirical
    # calibration.  Primary use: widen the coal-gas gap that the switch-on
    # methodology compresses.  In 2020 the carbon cost differential between
    # coal (846 kgCO₂/MWh_th ÷ 0.36 eff) and CCGT (488 kgCO₂/MWh_th ÷ 0.49
    # eff) at ~£25/tCO₂ effective carbon is ~£15-20/MWh, but empirical
    # calibration yields only ~£1 gap because both turn on at similar prices.
    carrier_mc_adjustments:
      coal: 15.0                         # +£15/MWh carbon cost premium

  # ── Subsidy-Aware MC (fallback for renewables without empirical data) ──────
  subsidies:
    enabled: false
    cfd_dispatch_cost: 0.0
    roc_buyout_prices:
      # Historical (Ofgem published obligation period buyout prices, April-March)
      2010: 36.99
      2011: 38.69
      2012: 40.71
      2013: 42.02
      2014: 43.30
      2015: 44.33
      2016: 44.77
      2017: 45.58
      2018: 47.22
      2019: 48.78
      2020: 50.05
      2021: 50.05
      2022: 54.73
      2023: 57.47
      2024: 59.10
      2025: 61.00
      2026: 62.83
      2027: 64.72
      2028: 66.66
      2029: 68.66
      2030: 70.72
      2031: 72.84
      2032: 75.03
      2033: 77.28
      2034: 79.60
      2035: 81.99
      2036: 84.45
      2037: 86.98

  # ── Biofuel Subsidy (ROC deduction for biomass/biogas merit order) ──────────
  # Dedicated biomass, biogas, landfill gas and sewage gas generators hold ROC
  # accreditation that pays them per MWh generated. This income reduces their
  # effective wholesale marginal cost below the thermal fuel-cost formula.
  # Without this deduction, biomass MC = £70-80/MWh (fuel/efficiency) and it
  # never dispatches; with it, MC ≈ -£5/MWh and it runs as baseload — matching
  # observed ESPENI dispatch of ~2,200 MW in 2020.
  #
  # Waste-to-energy is excluded (gate-fee economics differ from ROC subsidy).
  biofuel_subsidy:
    enabled: false
    # Per-carrier ROC banding (ROC/MWh). Used when the generator's own
    # ro_banding attribute is missing or zero.
    default_roc_bandings:
      biomass: 1.5                   # Ofgem dedicated biomass band
      advanced_biofuel: 1.5          # Same band as dedicated biomass
      biogas: 0.5                    # Ofgem standard band for AD biogas
      landfill_gas: 0.2              # Minimal ROC support (declining sector)
      sewage_gas: 0.5                # Ofgem standard band for sewage gas
    # ROC buyout price — if omitted, falls back to subsidies.roc_buyout_prices
    # roc_buyout_price: 50.05
    # MC floor: prevents ROC income from making biofuel MC negative (which causes
    # unconditional 100% dispatch). Set to a small positive value (GBP/MWh).
    mc_floor: 5.0

# ──────────────────────────────────────────────────────────────────────────────
# NUCLEAR AVAILABILITY SMOOTHING
# ──────────────────────────────────────────────────────────────────────────────
# Controls how ESPENI-derived nuclear availability is smoothed before applying
# as p_max_pu. "hourly" preserves the raw hourly signal (captures individual
# plant outages). "monthly" averages to monthly blocks (legacy behaviour,
# smooths out outage dips but loses temporal accuracy — r ≈ 0.04 vs hourly).
nuclear_availability_smoothing: "hourly"    # "hourly" | "daily" | "monthly"

# ──────────────────────────────────────────────────────────────────────────────
# THERMAL AVAILABILITY FACTORS
# ──────────────────────────────────────────────────────────────────────────────
# Constrains maximum output of thermal generators to reflect real-world availability.
# Biomass (Drax, Lynemouth) does not run at 100% due to pellet supply, maintenance.
# Small biofuel (biogas, LFG, sewage) are CHP plants that follow heat demand.
# For historical scenarios, factors are calibrated to match ESPENI actual dispatch.
thermal_availability_factors:
  enabled: false
  factors:
    biomass: 0.53           # 2252/4225 (ESPENI actual / installed)
    biogas: 0.15            # CHP heat-led, low electrical load factor
    landfill_gas: 0.15      # Intermittent methane availability
    sewage_gas: 0.15        # CHP heat-led
    advanced_biofuel: 0.15  # CHP / small distributed
    waste_to_energy: 0.80   # More continuous operation
  # Must-run minimum output (p_min_pu) — ROC/CHP generators that cannot be
  # turned below this level. Biomass (Drax/Lynemouth) runs continuously for
  # ROC income; biofuel CHP plants follow heat demand (not dispatchable).
  min_output:
    biomass: 0.40           # ROC revenue protection — rarely curtail below 40%
    waste_to_energy: 0.50   # Continuous waste processing obligation

# ──────────────────────────────────────────────────────────────────────────────
# SUBSIDY TRACKING (disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
# Controls whether CfD/ROC support_type is assigned to renewable generators
# during integration. Required for marginal_costs.subsidies and market revenue tracking.
# When disabled, no subsidy attributes are stored — all generators treated as merchant.
subsidy_tracking:
  enabled: false                          # Master toggle

  # ROC eligibility window (years from operational_date)
  roc_eligibility_years: 20              # Standard ROC accreditation period

  # Date-based ROC inference for REPD sites missing ro_banding data.
  # Non-CfD renewables operational before this date are assumed ROC-accredited
  # with default banding values below. After this date, new ROC accreditation closed.
  roc_closure_date: "2017-04-01"         # New ROC accreditation closed 1 April 2017

  # Default ROC banding (ROC/MWh) by carrier, used when REPD ro_banding field is blank.
  # Based on Ofgem published banding levels for the final accreditation period.
  # Only applied to sites operational before roc_closure_date that lack explicit data.
  default_roc_bandings:
    wind_onshore: 0.9                    # Ofgem Band 2 (2013-2017)
    wind_offshore: 2.0                   # Ofgem Band 2 (pre-2015 projects, most legacy)
    solar_pv: 1.2                        # Ofgem Band 3 (>50kW, 2013-2015)
    small_hydro: 1.0                     # Ofgem Band 2 (≤20MW)
    large_hydro: 1.0                     # Ofgem Band 2
    tidal_stream: 5.0                    # Ofgem Band 1 (emerging tech)
    shoreline_wave: 5.0                  # Ofgem Band 1 (emerging tech)
    biomass: 1.5                         # Ofgem dedicated biomass band

  # For FES-sourced generators (no REPD data), what fraction get CfD vs merchant.
  # Carriers not listed default to 0.0 (all merchant).
  fes_cfd_fractions:
    wind_offshore: 1.0                   # All new offshore assumed CfD
    wind_onshore: 0.3                    # 30% CfD, 70% merchant
    solar_pv: 0.5                        # 50% CfD, 50% merchant
    nuclear: 1.0                         # All new nuclear CfD (SZC)

  # CfD strike prices by allocation round (£/MWh nominal)
  # Used for post-solve revenue tracking only (NOT dispatch MC)
  cfd_strike_prices:
    AR1_offshore: 150.0
    AR2_offshore: 75.0
    AR3_offshore: 58.0
    AR4_offshore: 40.0
    AR5_offshore: 37.35
    AR6_offshore: 73.0
    AR6_onshore: 53.0
    AR6_solar: 47.0
    future_offshore: 80.0               # Projected for 2030s
    future_onshore: 55.0
    future_solar: 50.0
    future_nuclear: 92.50               # SZC strike price

# ──────────────────────────────────────────────────────────────────────────────
# INTERCONNECTOR PRICING
# ──────────────────────────────────────────────────────────────────────────────
# Controls how EU_supply generator marginal costs are set.
#
# source options:
#   "derived"  — Annual average from FES European generation-mix merit order (default).
#                No API token required. Produces a single scalar MC per country.
#   "entsoe"   — Hourly day-ahead prices from the ENTSO-E Transparency Platform.
#                Requires an API token in .env or ENTSOE_API_TOKEN env var.
#                Falls back to "derived" if the token is missing or fetch fails.
#   "csv"      — User-supplied hourly CSV (datetime index, one column per country).
#
# For future scenarios (>2024) with source "entsoe":
#   Hourly prices are fetched for the WEATHER year (e.g. 2021 for a dunkelflaute
#   scenario), then scaled so the annual mean matches the FES-derived MC for the
#   modelled year. This preserves the hourly price shape (weather-correlated)
#   while matching the projected annual price level.
#
# For historical scenarios (≤2024) with source "entsoe":
#   Actual ENTSO-E prices for the modelled year are used directly (no scaling).
#   Flows remain fixed (ESPENI p_set) but the MC feeds shadow prices / marginal
#   pricing signals for accurate wholesale price reporting.
interconnectors:
  pricing:
    source: "derived"                 # "derived" | "entsoe" | "csv"
    eur_to_gbp: 0.86                # EUR→GBP conversion rate
    gb_price: 50.0                   # GB wholesale price for price differentials (£/MWh)
    price_floor: 0.0                # Minimum EU price (£/MWh)
    price_cap: 500.0                # Maximum EU price (£/MWh)
    csv_file: null                  # Path to user-supplied CSV (source: "csv" only)

# ──────────────────────────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────────────────────────

logging:
  level: "INFO"                     # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_to_file: true
  log_directory: "logs"

# ──────────────────────────────────────────────────────────────────────────────
# DEMAND DATA SOURCES
# ──────────────────────────────────────────────────────────────────────────────
# Temporal profile source for demand (future annual totals use FES ED1 consumer demand)
# Options:
#   "ESPENI"    - Historical half-hourly GB demand shape (historical runs use it directly)
#   "eload"     - eLOAD model hourly profile (2010 or 2050 via profile_year)
#   "desstinee" - DESSTINEE model hourly profile (2010 or 2050 via profile_year)
# 
# Future runs scale the chosen profile to ED1 consumer demand and allocate by Dem_BB003 GSP shares. For eload/desstinee, profile_year auto-selects (2050 if modelled_year >= 2040, else 2010)
demand_timeseries: "ESPENI"

# ──────────────────────────────────────────────────────────────────────────────
# DEMAND DISAGGREGATION (optional, disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
# When enabled in a scenario, components are disaggregated from total demand.
# Defaults prefer FES-based fractions and GSP spatial allocation for future scenarios.

demand_disaggregation:
  enabled: false
  components:
    - name: "heat_pumps"
      allocation_method: "fes_gsp"
      use_fes_fraction: true
      min_gwh_threshold: 0.01
    - name: "electric_vehicles"
      allocation_method: "fes_gsp"
      use_fes_fraction: true
      min_gwh_threshold: 0.01

# ──────────────────────────────────────────────────────────────────────────────
# DEMAND-SIDE FLEXIBILITY
# ──────────────────────────────────────────────────────────────────────────────
# Model demand-side flexibility from heat pumps, EVs, and demand response.
# Each flexibility type can be independently enabled/disabled.
# Requires demand_disaggregation to be enabled for HP and EV components.

demand_flexibility:
  # Master switch - must be true for any flexibility to be modeled
  enabled: false

  # HEAT PUMP FLEXIBILITY (independently toggleable)
  # Requires heat_pumps in demand_disaggregation.components
  heat_pumps:
    enabled: false                    # Independent toggle for HP flexibility
    mode: "MIXED"                     # TANK, COSY, or MIXED (use mix shares below)
    flex_share: 0.2                   # Fraction of HP demand that is flexible
    mix:
      tank_share: 0.5                 # Fraction of flexible HP demand using TANK mode
      cosy_share: 0.5                 # Fraction of flexible HP demand using COSY mode
    # Spatial allocation
    urban_weight: 1.5                      # Power exponent for urban-weighted allocation (>1 = more urban)
    peak_thermal_kw_per_dwelling: 10.0     # Assumed peak thermal output per dwelling (kW)
    link_sizing_margin: 1.5                # Margin factor for HP link capacity (1.5 = 50% headroom)
    # COSY mode: Pre-heating using building thermal mass
    cosy:
      morning_window: ["07:00", "09:00"]   # Morning pre-heat window
      evening_window: ["17:00", "19:00"]   # Evening pre-heat window
      max_temp_deviation_celsius: 2.0      # Max comfort deviation (±°C)
      thermal_mass_hours: 0.3              # Hours of heating that can be stored in building fabric
                                           # Based on ~2.7 kWh/dwelling at ~10 kW peak thermal
      standing_loss_per_hour: 0.05         # Building thermal loss rate (5%/hour, faster than tank)
    # TANK mode: Hot water tank storage
    tank:
      volume_liters: 200              # Average tank volume
      temp_range: [50, 65]            # Min/max temperature (°C)
      standing_loss_per_hour: 0.01    # Heat loss fraction per hour (1%)
      heater_power_kw: 3.0            # Immersion heater power

  # ELECTRIC VEHICLE FLEXIBILITY (independently toggleable)
  # Requires electric_vehicles in demand_disaggregation.components
  # 
  # EV flexibility modeling uses FES building blocks:
  #   - Dem_BB006: EV domestic charging demand (GWh)
  #   - Dem_BB007: EV non-domestic charging demand (GWh)
  #   - Srg_BB005: V2G availability (MW) - used for V2G and MIXED modes
  #   - Srg_BB007a: Smart charging availability (MW) - used for MIXED mode
  #
  # Without flexibility, EVs are simple Load components with evening-peak profile.
  # With flexibility, Store + Link components enable charging optimization.
  electric_vehicles:
    enabled: false                    # Independent toggle for EV flexibility
    tariff: "MIXED"                     # GO, INT, V2G, or MIXED (see modes below)
    
    # Flex share: Fraction of EV demand that participates in flexibility
    # Controls DEMAND SPLIT: 20% → smart charging, 80% → dumb loads
    # 1.0 = all EVs are flexible, 0.2 = only 20% of EV demand uses smart charging
    flex_share: 0.2

    # Fleet characteristics (affect storage/charger sizing)
    battery_capacity_kwh: 60.0        # Average EV battery size (kWh)
    charge_efficiency: 0.90           # Grid-to-battery efficiency
    flexibility_participation: 0.10   # Fraction of fleet participating in smart charging

    # Spatial allocation and fleet sizing
    urban_weight: 2.0                 # Power exponent for urban-weighted allocation (>1 = more urban)
    energy_per_vehicle_kwh_per_day: 10.0  # Assumed daily energy consumption per vehicle (kWh)
    charging_hours_per_day: 4.0       # Assumed charging hours/day (for FES share calculation)
    min_share_threshold: 0.001        # Minimum tariff share to create components
    
    # GO tariff: Octopus Go style fixed night window
    # Simple time-of-use tariff with cheap overnight rates
    # Charging is incentivized during window via cost differential,
    # but charging CAN still occur outside window if needed (at higher cost)
    go:
      window: ["00:00", "04:00"]      # Cheap charging window (4 hours)
      window_cost: 0.0                # Marginal cost during cheap window (£/MWh)
      offpeak_cost: 100.0             # Marginal cost outside window (£/MWh)
    
    # INT tariff: Intelligent/smart charging - fully optimizable
    # Charging can be shifted across all hours when plugged in
    int:
      min_soc: 0.20                   # Minimum SOC (range anxiety buffer)
      target_departure_soc: 0.80      # Target SOC at departure time (7am)
      charger_power_kw: 7.0           # Home charger power (kW)
    
    # V2G: Vehicle-to-grid bidirectional
    # EVs can discharge back to grid for additional flexibility
    # V2G capacity sources (in order of priority):
    #   1. FES Srg_BB005 if use_fes_capacity: true (distributed by EV demand)
    #   2. Calculated from fleet × participation_rate × charger_power
    v2g:
      participation_rate: 0.30        # Fraction of flexible fleet with V2G (if not using FES)
      discharge_efficiency: 0.90      # Battery-to-grid efficiency
      max_discharge_soc: 0.80         # Don't discharge below 20% SOC
      degradation_cost_per_mwh: 50.0  # Battery wear cost (£/MWh)
      use_fes_capacity: true          # Use FES Srg_BB005 V2G capacity (17.9 GW for HT 2035)
    
    # MIXED mode: Split EV fleet across GO, INT, and V2G tariffs
    # This provides a realistic mix of charging behaviors
    # Shares are calculated from FES data or can be manually overridden
    mixed:
      # Share calculation mode:
      #   "fes" - Use FES building blocks to calculate shares (recommended)
      #   "manual" - Use the shares defined below
      mode: "fes"
      
      # Manual share overrides (used if mode: "manual" or FES data unavailable)
      # Must sum to 1.0
      go_share: 0.30                  # 30% on Octopus Go style (fixed window)
      int_share: 0.50                 # 50% on intelligent smart charging
      v2g_share: 0.20                 # 20% with V2G capability
      
      # FES-derived share options (used if mode: "fes")
      # V2G share is derived from FES Srg_BB005 (V2G MW) / total EV charging capacity
      # INT share is the remaining smart charging capacity from FES Srg_BB007a
      # GO share is the remainder (non-smart charging EVs)
      fes_share_overrides:
        # Optional: Override specific shares even in FES mode
        # Uncomment to fix a share while others adjust
        # go_share: 0.20              # Force 20% GO, rest from FES
        # v2g_share: null             # null = use FES value
    
    # Availability profile parameters (from GB traffic patterns)
    # EVs available for charging when parked (inversely related to traffic)
    availability:
      avail_max: 0.95                 # Max fraction plugged in (overnight)
      avail_mean: 0.80                # Mean fraction plugged in
      departure_hour: 7               # Morning departure time for DSM constraint

  # EVENT RESPONSE / DEMAND RESPONSE (independently toggleable)
  # Saving Sessions style demand response events - DOMESTIC DSR only
  # This represents households reducing demand during peak periods
  event_response:
    enabled: false                    # Independent toggle for event response
    
    # EVENT FREQUENCY MODES (choose one):
    #   "regular"  - 2 events/week YEAR-ROUND (baseline flexibility, constant participation)
    #   "winter"   - 5 events/week Oct-Mar ONLY, 0 events Apr-Sep (crisis mode, winter peaks)
    #   "both"     - 2 events/week year-round + extra 5 events/week during Oct-Mar (realistic mix)
    mode: "both"
    events_per_week_regular: 2          # Events per week in regular/both modes
    events_per_week_winter: 5           # Events per week in winter/both modes
    
    # Event Window Options (choose one, realistic alternatives):
    #   ["17:00", "19:00"]  - Evening peak only (tight window, high utilization)
    #   ["16:00", "20:00"]  - Extended evening (covers demand ramp-up)
    #   ["07:00", "22:00"]  - Full day flexibility (most realistic for modern DSR)
    event_window: ["07:00", "22:00"]  # Default: evening peak window
    
    dsr_capacity_mw: null             # User-defined domestic DSR capacity (MW)
    # If dsr_capacity_mw is set: Uses that value directly
    # If null: Calculates from participation_rate * max_reduction_fraction * demand
    participation_rate: 0.33          # Fallback: participation rate (33%)
    max_reduction_fraction: 0.10      # Fallback: max demand reduction per event (10%)
    marginal_cost: 100.0              # DSR incentive payment (£/MWh) - high cost = only dispatch if needed
    winter_months: [10, 11, 12, 1, 2, 3]  # Oct-Mar for winter mode

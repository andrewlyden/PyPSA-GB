# ══════════════════════════════════════════════════════════════════════════════
# RENEWABLE AGGREGATION TEST SCENARIOS
# Run these two side-by-side to verify aggregation correctness:
#   snakemake -j 2 --use-conda --latency-wait 60
# Then compare generator counts in the logs / resources/generators/ CSVs.
# ══════════════════════════════════════════════════════════════════════════════

# Historical path — BOTH aggregations ON (renewable + component)
Test_Agg_Historical:
  description: "2020 Historical Reduced - WITH renewable + component aggregation (test)"
  modelled_year: 2020
  renewables_year: 2020
  demand_year: 2020
  network_model: "Reduced"
  renewable_aggregation:
    enabled: true
  component_aggregation:
    enabled: true
    include_storage_units: true
    include_loads: true
  solve_period:
    enabled: true
    start: "2020-01-01 00:00"
    end: "2020-01-01 05:00"

# Historical path — BOTH aggregations OFF (baseline)
Test_NoAgg_Historical:
  description: "2020 Historical Reduced - WITHOUT aggregation (baseline)"
  modelled_year: 2020
  renewables_year: 2020
  demand_year: 2020
  network_model: "Reduced"
  renewable_aggregation:
    enabled: false
  component_aggregation:
    enabled: false
  solve_period:
    enabled: true
    start: "2020-01-01 00:00"
    end: "2020-01-01 05:00"

# Future path — BOTH aggregations ON (renewable + component)
Test_Agg_Future:
  description: "HT 2035 Reduced - WITH renewable + component aggregation (test)"
  modelled_year: 2035
  FES_year: 2024
  FES_scenario: "Holistic Transition"
  renewables_year: 2020
  demand_year: 2020
  network_model: "Reduced"
  renewable_aggregation:
    enabled: true
  component_aggregation:
    enabled: true
    include_storage_units: true
    include_loads: true
  solve_period:
    enabled: true

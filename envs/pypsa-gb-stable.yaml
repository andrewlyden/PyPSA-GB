# Stable environment pinned from the local pypsa-gb environment.
# Generated from top-level dependencies in envs/pypsa-gb.yaml.
name: pypsa-gb-stable
channels:
- conda-forge
- bioconda
dependencies:
- python=3.12.12
- pip=25.2

# Core PyPSA ecosystem
- pypsa=1.0.7
- atlite=0.4.1
- linopy=0.5.7
- powerplantmatching=0.7.1

# Data processing & analysis
- numpy=1.26.4
- pandas=2.3.3
- scipy=1.16.2
- xarray=2025.9.0
- networkx=3.5
- dask=2025.10.0

# Geospatial & coordinate systems
- geopandas=1.1.1
- pyproj=3.7.2
- shapely=2.0.7
- fiona=1.10.1
- rasterio=1.4.3
- rioxarray=0.20.0
- cartopy=0.25.0
- descartes=1.1.0

# Machine learning & clustering
- scikit-learn=1.7.2

# Snakemake workflow
- snakemake-minimal=9.13.4
- snakemake-storage-plugin-http=0.3.0
- snakemake-executor-plugin-slurm=1.8.0
- snakemake-executor-plugin-cluster-generic=1.0.9
- memory_profiler=0.61.0

# Data I/O
- xlrd=2.0.2
- openpyxl=3.1.5
- pyxlsb=1.0.10
- pytables=3.10.2
- lxml=6.0.2
- yaml=0.2.5
- netcdf4=1.7.2
- libgdal-netcdf=3.10.3
- geojson=3.2.0
- pyarrow=22.0.0

# String matching & fuzzy matching
- levenshtein=0.27.1
- fuzzywuzzy=0.18.0

# Web & API interactions
- requests=2.32.5
- country_converter=1.3.2
- geopy=2.4.1

# Visualization
- matplotlib=3.10.7
- seaborn=0.13.2
- plotly=6.3.1
- pydeck=0.9.1
- graphviz=13.1.2

# Utilities
- tqdm=4.67.1
- pytz=2025.2
- jpype1=1.6.0
- proj=9.6.2

# Solvers
- glpk=5.0
- pyscipopt=5.6.0

# Documentation generation (Sphinx)
- sphinx=8.2.3
- sphinx_rtd_theme=3.0.2
- myst-parser=4.0.1
- sphinx-copybutton=0.5.2
- sphinx-design=0.6.1
- sphinxcontrib-mermaid=1.2.3
- nbsphinx=0.9.8
- pandoc=3.8.3
- docutils=0.21.2

# Development & Jupyter
- jupyter=1.1.1
- ipython=9.6.0
- ipykernel=7.1.0
- pre-commit=4.3.0
- ruff=0.14.2
- pylint=4.0.2

- pip:
  - gurobipy==12.0.3
  - highspy==1.12.0
  - tsam==2.3.9
  - entsoe-py==0.7.8
  - nbsphinx-link==1.3.1
